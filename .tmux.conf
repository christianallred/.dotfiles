# --- Prefix --------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- General -------------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on

# True color for nvim (broad pattern so it matches xterm-ghostty etc.)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Vim-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Give the session name room on the left so long names don't truncate
set -g status-left-length 40
set -g status-right-length 80

# Show "PREFIX" in the status bar when the prefix key is active
set -g status-right "#{?client_prefix,#[reverse] PREFIX #[noreverse] ,}%H:%M "

# Status bar + command prompt / message colors — subtle dark slate
set -g status-style                "fg=#a9b1d6,bg=#1e2030"
set -g message-style               "fg=#a9b1d6,bg=#1e2030"
set -g message-command-style       "fg=#a9b1d6,bg=#1e2030"
set -g window-status-style         "fg=#6c7086,bg=#1e2030"
set -g window-status-current-style "fg=#c0caf5,bg=#2a2d3e,bold"

# --- Bindings ------------------------------------------------------------
# Reload config
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Splits keep current dir; | and - are more intuitive than " and %
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim pane nav
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Sessionizer: prefix + f opens the worktree/project picker in a popup.
# -E auto-closes when the script exits, so no orphan window is left behind.
bind f display-popup -E -w 90% -h 80% "~/.dotfiles/scripts/tmux_session.sh"


# Jump straight to windows (no prefix).
# Triggered by Cmd+<digit> in Ghostty, which sends ESC+<digit> (a.k.a. M-<digit>).
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
